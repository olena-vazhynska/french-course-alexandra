<!DOCTYPE html>
<html lang="fr">
<head>

</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useCallback}=React;
const MODULES=[
  {id:0,icon:"🗼",city:"Paris, France",title:"A Paris",color:"#6366f1",bg:"#eef2ff",lessons:[
    {id:"0-0",type:"dialogue",title:"A l'hotel",xp:30,hint_ru:"Диалог в отеле — практикуй вежливые формы обращения!",lines:[{s:"Receptionniste",t:"Bonjour ! Vous avez une reservation ?"},{s:"Alexandra",t:"Oui, j'ai reserve une chambre pour trois nuits au nom d'Ivanova."},{s:"Receptionniste",t:"Parfait ! Chambre 214, au deuxieme etage. Voici votre cle."},{s:"Alexandra",t:"Merci. Est-ce que le petit-dejeuner est inclus ?"},{s:"Receptionniste",t:"Oui, il est servi de 7h a 10h au restaurant."}],vocab:[{fr:"une reservation",ru:"бронирование"},{fr:"au nom de",ru:"на имя"},{fr:"le deuxieme etage",ru:"второй этаж"},{fr:"le petit-dejeuner",ru:"завтрак"},{fr:"est inclus",ru:"включён"}]},
    {id:"0-1",type:"quiz",title:"Quiz — L'hotel",xp:40,hint_ru:"Вопросы по диалогу!",questions:[{q:"Pour combien de nuits Alexandra a-t-elle reserve ?",o:["Deux nuits","Trois nuits","Une semaine","Quatre nuits"],a:1},{q:"A quel etage est la chambre ?",o:["Premier","Troisieme","Deuxieme","Rez-de-chaussee"],a:2},{q:"Jusqu'a quelle heure est servi le petit-dejeuner ?",o:["9h","11h","10h","8h"],a:2}]},
    {id:"0-2",type:"fillin",title:"Grammaire — Le subjonctif",xp:50,hint_ru:"Сюбжонктив — после глаголов желания и эмоций. Ex: 'il faut que tu viennes'.",expl:"Le subjonctif s'utilise apres: vouloir que, il faut que, etre content(e) que...",sentences:[{b:"Il faut que tu ",blank:"sois",a:" a l'heure.",o:["es","sois","etre","soit"]},{b:"Je suis contente que vous ",blank:"puissiez",a:" nous rejoindre.",o:["pouvez","pouvoir","puissiez","puissent"]},{b:"Il vaut mieux que nous ",blank:"prenions",a:" le metro.",o:["prenons","prendrons","prenions","prendre"]}]},
    {id:"0-3",type:"scenario",title:"Scenario — Au Louvre",xp:60,hint_ru:"Выбери подходящую реплику!",setup:"Tu es devant la pyramide du Louvre. Un touriste t'aborde.",exchanges:[{s:"Touriste",t:"Excusez-moi, savez-vous ou se trouve la Joconde ?",o:["Je ne sais pas parler.","Oui, elle est dans la salle Denon, au premier etage !","Non, je veux partir."],c:1,f:["Trop abrupte ! 😅","Parfait ! 🎉","Pas tres aimable..."]},{s:"Touriste",t:"Merci ! Vous visitez aussi le musee ?",o:["Oui, je prevois de voir les antiquites grecques.","Non, je suis pressee.","Peut-etre demain ou jamais."],c:0,f:["Excellent ! 👏","Correct mais sec !","Pas tres communicatif..."]}]}
  ]},
  {id:1,icon:"🇨🇭",city:"Geneve, Suisse",title:"A Geneve",color:"#0891b2",bg:"#ecfeff",lessons:[
    {id:"1-0",type:"reading",title:"Lecture — La sante en Suisse",xp:40,hint_ru:"Чтение о швейцарском здравоохранении.",text:"En Suisse, tout resident est oblige de souscrire une assurance maladie de base, appelee LAMal. Cette assurance couvre les soins medicaux essentiels : consultations, hospitalisations, et medicaments sur ordonnance.\n\nChaque assure choisit son medecin de famille. Pour consulter un specialiste, il faut une reference de ce medecin.\n\nGeneve attire des professionnels du monde entier — comme Alexandra !",questions:[{q:"Qu'est-ce que la LAMal ?",o:["Une banque suisse","L'assurance maladie obligatoire","Un hopital genevois","Une carte de transport"],a:1},{q:"Que faut-il pour consulter un specialiste ?",o:["Payer en avance","Parler allemand","Une reference du medecin traitant","Un passeport europeen"],a:2}]},
    {id:"1-1",type:"writing",title:"Email professionnel",xp:70,hint_ru:"Формулы: 'Je me permets de vous contacter' = Позвольте обратиться. 'Veuillez agreer mes salutations distinguees' = С уважением.",prompt:"Redige un email a ton medecin genevois pour prendre rendez-vous.",starter:"Madame, Monsieur,\n\nJe me permets de vous contacter afin de...",tips:["Commence par 'Je me permets de...'","Propose deux creneaux disponibles","Termine par : 'Veuillez agreer mes salutations distinguees.'"]},
    {id:"1-2",type:"quiz",title:"Quiz — Vocabulaire medical",xp:40,hint_ru:"Медицинская лексика!",questions:[{q:"Comment dit-on 'ordonnance' ?",o:["ordination","prescription","ordonnance","reservation"],a:2},{q:"Que veut dire 'avoir de la fievre' ?",o:["avoir faim","avoir chaud","avoir une temperature elevee","avoir mal au dos"],a:2},{q:"Synonyme de 'medecin' ?",o:["infirmier","docteur","pharmacien","dentiste"],a:1},{q:"Qu'est-ce qu'une 'franchise' medicale ?",o:["Une clinique gratuite","Le montant a payer avant remboursement","Un medicament","Un remboursement immediat"],a:1}]}
  ]},
  {id:2,icon:"🍫",city:"Bruxelles, Belgique",title:"A Bruxelles",color:"#d97706",bg:"#fffbeb",lessons:[
    {id:"2-0",type:"dialogue",title:"Au marche",xp:30,hint_ru:"Разговор на рынке!",lines:[{s:"Vendeur",t:"Bonjour ! Qu'est-ce qu'il vous faut ?"},{s:"Alexandra",t:"Bonjour ! Je voudrais un kilo de tomates et une botte de persil, s'il vous plait."},{s:"Vendeur",t:"Voila ! Et avec ca ?"},{s:"Alexandra",t:"C'est combien pour les fraises ? Elles ont l'air delicieuses !"},{s:"Vendeur",t:"Trois euros la barquette. Si vous en prenez deux, je vous fais un prix !"},{s:"Alexandra",t:"D'accord, je prends deux barquettes alors. Merci !"}],vocab:[{fr:"une botte de persil",ru:"пучок петрушки"},{fr:"une barquette",ru:"лоток/упаковка"},{fr:"Ils ont l'air...",ru:"Они выглядят..."},{fr:"je vous fais un prix",ru:"сделаю скидку"},{fr:"Et avec ca ?",ru:"Что-нибудь ещё?"}]},
    {id:"2-1",type:"fillin",title:"Grammaire — Le conditionnel",xp:50,hint_ru:"Кондиционал: инфинитив + -ais, -ais, -ait, -ions, -iez, -aient.",expl:"Le conditionnel exprime la politesse ou une hypothese. 'Je voudrais' est plus poli que 'Je veux'.",sentences:[{b:"Est-ce que vous ",blank:"pourriez",a:" m'indiquer la rue du Marche ?",o:["pouvez","pourriez","pouviez","puissiez"]},{b:"J'",blank:"aimerais",a:" gouter les gaufres belges.",o:["aime","aimais","aimerais","aimerai"]},{b:"Si j'avais le temps, je ",blank:"visiterais",a:" le Manneken Pis.",o:["visite","visitais","visiterai","visiterais"]}]},
    {id:"2-2",type:"scenario",title:"Scenario — Au restaurant belge",xp:60,hint_ru:"Заказ в ресторане!",setup:"Tu es dans une brasserie bruxelloise. Le serveur s'approche.",exchanges:[{s:"Serveur",t:"Bonsoir ! Vous avez choisi ?",o:["Oui, donnez-moi des moules.","Je voudrais les moules-frites, s'il vous plait.","Je veux manger maintenant."],c:1,f:["Trop direct !","Parfait ! 🍟🦪","Trop brusque !"]},{s:"Serveur",t:"Et comme boisson ?",o:["De l'eau gazeuse, s'il vous plait.","De l'eau.","Rien."],c:0,f:["Excellent ! 👏","Correct mais incomplet !","C'est un peu sec..."]}]}
  ]},
  {id:3,icon:"🌴",city:"Martinique",title:"En Martinique",color:"#16a34a",bg:"#f0fdf4",lessons:[
    {id:"3-0",type:"reading",title:"Lecture — La culture creole",xp:40,hint_ru:"Чтение о культуре Мартиники!",text:"La Martinique est un departement francais d'outre-mer situe dans les Caraibes. On y parle francais, mais aussi le creole martiniquais.\n\nLa culture martiniquaise est riche et coloree. Le zouk, ne aux Antilles, est un genre musical incontournable. Le plat traditionnel est le colombo, un curry antillais parfume.\n\nLes Martiniquais sont reputes pour leur chaleur humaine. N'oublie pas de gouter les accras de morue !",questions:[{q:"Quelles langues parle-t-on en Martinique ?",o:["Francais seulement","Creole seulement","Francais et creole","Espagnol et francais"],a:2},{q:"Qu'est-ce que le colombo ?",o:["Une danse antillaise","Un curry antillais","Un fruit tropical","Un instrument de musique"],a:1}]},
    {id:"3-1",type:"quiz",title:"Quiz final — Tour du monde francophone",xp:80,hint_ru:"Финальный тест! 🎉",questions:[{q:"Subjonctif de 'etre' a la 2e personne ?",o:["es","seras","sois","etais"],a:2},{q:"Comment commander poliment ?",o:["Je veux une table","Donnez-moi une table","Je voudrais une table, s'il vous plait","Une table maintenant"],a:2},{q:"Que signifie la LAMal ?",o:["Un train suisse","L'assurance maladie obligatoire","Un musee","Un parti politique"],a:1},{q:"'Et avec ca ?' signifie ?",o:["C'est tout ?","Vous voulez autre chose ?","Quoi d'autre ?","Toutes ces reponses"],a:3},{q:"Genre musical ne aux Antilles ?",o:["Reggae","Salsa","Zouk","Bossa nova"],a:2}]},
    {id:"3-2",type:"writing",title:"Defi final — Carte postale de Martinique",xp:80,hint_ru:"Passé composé: avoir/être + причастие. 'J'ai mange' (я съела), 'Je suis allee' (я пошла).",prompt:"Ecris une carte postale depuis la Martinique (80-100 mots).",starter:"Chere/Cher ...,\n\nMe voila en Martinique ! Le soleil...",tips:["Utilise le passe compose : 'J'ai visite...', 'Nous avons mange...'","Adjectifs : magnifique, colore, epice, chaleureux","Pour demain : 'Je vais aller a la plage / gouter les accras'"]}
  ]}
];
const BADGES=[
  {id:"b1",icon:"👣",label:"Premier Pas",ok:(xp)=>xp>=30},
  {id:"b2",icon:"⭐",label:"Mi-Parcours",ok:(xp)=>xp>=200},
  {id:"b3",icon:"📚",label:"Grammairienne",ok:(_,d)=>d.some(id=>id.includes("fillin"))},
  {id:"b4",icon:"✍️",label:"Plume d'or",ok:(_,d)=>d.some(id=>id.includes("writing"))},
  {id:"b5",icon:"🏆",label:"Championne B1",ok:(xp)=>xp>=600},
];
const MAX_XP=MODULES.reduce((s,m)=>s+m.lessons.reduce((ss,l)=>ss+l.xp,0),0);
const TOTAL=MODULES.reduce((s,m)=>s+m.lessons.length,0);
function tIcon(t){return{dialogue:"💬",quiz:"❓",fillin:"📝",scenario:"🎭",reading:"📖",writing:"✍️"}[t]||"📋";}
function Btn({onClick,children,color,disabled}){
  return <button onClick={onClick} disabled={disabled} style={{background:disabled?"#e2e8f0":color,color:disabled?"#94a3b8":"#fff",border:"none",borderRadius:99,padding:"12px 28px",fontWeight:700,fontSize:15,cursor:disabled?"not-allowed":"pointer",marginTop:16}}>{children}</button>;
}
function App(){
  const [screen,setScreen]=useState("home");
  const [mi,setMi]=useState(null);
  const [li,setLi]=useState(null);
  const [done,setDone]=useState([]);
  const [xp,setXp]=useState(0);
  const [hint,setHint]=useState(false);
  const [ls,setLs]=useState({});
  const badges=BADGES.filter(b=>b.ok(xp,done));
  const pct=Math.round((done.length/TOTAL)*100);
  const complete=useCallback((lid,pts)=>{
    if(!done.includes(lid)){setDone(p=>[...p,lid]);setXp(p=>p+pts);}
    const mod=MODULES[mi];
    const idx=mod.lessons.findIndex(l=>l.id===lid);
    if(idx<mod.lessons.length-1){setLi(idx+1);setHint(false);setLs({});}
    else setScreen("done");
  },[done,mi]);
  const mod=mi!==null?MODULES[mi]:null;
  return(
    <div style={{minHeight:"100vh",background:"#f8fafc",fontFamily:"'Segoe UI',sans-serif"}}>
      {screen==="home"&&<Home setScreen={setScreen} setMi={setMi} setLi={setLi} setHint={setHint} setLs={setLs} done={done} xp={xp} pct={pct} badges={badges}/>}
      {screen==="mod"&&mod&&<Mod mod={mod} done={done} setScreen={setScreen} setLi={setLi} setHint={setHint} setLs={setLs}/>}
      {screen==="lesson"&&mod&&<LessonView lesson={mod.lessons[li]} mod={mod} hint={hint} setHint={setHint} ls={ls} setLs={setLs} complete={complete} done={done} setScreen={setScreen}/>}
      {screen==="done"&&mod&&<Done mod={mod} setScreen={setScreen} xp={xp} badges={badges}/>}
    </div>
  );
}
function Home({setScreen,setMi,setLi,setHint,setLs,done,xp,pct,badges}){
  return(
    <div style={{maxWidth:700,margin:"0 auto",padding:"24px 16px"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:48}}>🇫🇷</div>
        <h1 style={{fontSize:26,fontWeight:800,color:"#1e293b",margin:"8px 0 4px"}}>Le Francais en Voyage 🌍</h1>
        <p style={{color:"#64748b",fontSize:15}}>Parcours interactif B1 pour Alexandra</p>
      </div>
      <div style={{background:"#fff",borderRadius:16,padding:20,marginBottom:20,boxShadow:"0 2px 8px #0001"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <span style={{fontWeight:700,color:"#1e293b"}}>Progression</span>
          <span style={{color:"#6366f1",fontWeight:700}}>{xp} XP</span>
        </div>
        <div style={{background:"#e2e8f0",borderRadius:99,height:12,overflow:"hidden"}}>
          <div style={{width:`${pct}%`,background:"linear-gradient(90deg,#6366f1,#a855f7)",height:"100%",borderRadius:99,transition:"width .5s"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:13,color:"#94a3b8"}}>
          <span>{done.length}/{TOTAL} lecons</span><span>{pct}%</span>
        </div>
      </div>
      {badges.length>0&&(
        <div style={{background:"#fff",borderRadius:16,padding:16,marginBottom:20,boxShadow:"0 2px 8px #0001"}}>
          <div style={{fontWeight:700,color:"#1e293b",marginBottom:10}}>🏅 Badges obtenus</div>
          <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
            {badges.map(b=>(
              <div key={b.id} style={{textAlign:"center",background:"#faf5ff",border:"2px solid #a855f7",borderRadius:12,padding:"8px 14px"}}>
                <div style={{fontSize:22}}>{b.icon}</div>
                <div style={{fontSize:11,fontWeight:600,color:"#7c3aed"}}>{b.label}</div>
              </div>
            ))}
          </div>
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {MODULES.map((mod,idx)=>{
          const d=mod.lessons.filter(l=>done.includes(l.id)).length,t=mod.lessons.length;
          return(
            <div key={mod.id} onClick={()=>{setMi(idx);setLi(0);setHint(false);setLs({});setScreen("mod");}}
              style={{background:mod.bg,border:`2px solid ${mod.color}30`,borderRadius:16,padding:"18px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:16,boxShadow:"0 2px 8px #0001"}}>
              <div style={{fontSize:36}}>{mod.icon}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:"#1e293b",fontSize:16}}>{mod.title}</div>
                <div style={{color:"#64748b",fontSize:13}}>{mod.city} · {t} lecons</div>
                <div style={{background:"#e2e8f0",borderRadius:99,height:6,marginTop:8,overflow:"hidden"}}>
                  <div style={{width:`${Math.round((d/t)*100)}%`,background:mod.color,height:"100%",borderRadius:99}}/>
                </div>
              </div>
              <div style={{color:mod.color,fontWeight:800,fontSize:18}}>{d}/{t}</div>
            </div>
          );
        })}
      </div>
      <div style={{textAlign:"center",color:"#94a3b8",fontSize:13,marginTop:24}}>⏱ 4 heures · Niveau B1 · Russe disponible 🇷🇺</div>
    </div>
  );
}
function Mod({mod,done,setScreen,setLi,setHint,setLs}){
  return(
    <div style={{maxWidth:700,margin:"0 auto",padding:"24px 16px"}}>
      <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",color:mod.color,fontWeight:700,cursor:"pointer",fontSize:15,marginBottom:16}}>&#8592; Retour</button>
      <div style={{background:mod.bg,borderRadius:20,padding:"24px 20px",marginBottom:20,border:`2px solid ${mod.color}30`}}>
        <div style={{fontSize:40,marginBottom:8}}>{mod.icon}</div>
        <h2 style={{fontSize:22,fontWeight:800,color:"#1e293b",margin:"0 0 4px"}}>{mod.title}</h2>
        <div style={{color:"#64748b",fontSize:14}}>{mod.city}</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {mod.lessons.map((l,idx)=>{
          const d=done.includes(l.id);
          return(
            <div key={l.id} onClick={()=>{setLi(idx);setHint(false);setLs({});setScreen("lesson");}}
              style={{background:"#fff",borderRadius:14,padding:"16px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,border:`2px solid ${d?mod.color:"#e2e8f0"}`,boxShadow:"0 1px 4px #0001"}}>
              <div style={{fontSize:24}}>{d?"✅":tIcon(l.type)}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:"#1e293b"}}>{l.title}</div>
                <div style={{color:"#94a3b8",fontSize:13}}>{l.type} · {l.xp} XP</div>
              </div>
              {d&&<span style={{color:mod.color,fontWeight:800}}>✓</span>}
            </div>
          );
        })}
      </div>
    </div>
  );
}
function LessonView({lesson,mod,hint,setHint,ls,setLs,complete,done,setScreen}){
  const ad=done.includes(lesson.id);
  return(
    <div style={{maxWidth:700,margin:"0 auto",padding:"24px 16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <button onClick={()=>setScreen("mod")} style={{background:"none",border:"none",color:mod.color,fontWeight:700,cursor:"pointer",fontSize:15}}>&#8592; Module</button>
        <div style={{flex:1}}/>
        <button onClick={()=>setHint(!hint)} style={{background:hint?"#fef3c7":"#f1f5f9",border:"none",borderRadius:99,padding:"6px 14px",cursor:"pointer",fontWeight:600,fontSize:13,color:"#92400e"}}>
          {hint?"🇷🇺 Скрыть":"🇷🇺 Подсказка"}
        </button>
      </div>
      {hint&&<div style={{background:"#fef3c7",border:"1.5px solid #fbbf24",borderRadius:12,padding:"12px 16px",marginBottom:16,fontSize:14,color:"#92400e"}}>💡 {lesson.hint_ru}</div>}
      <div style={{background:"#fff",borderRadius:20,padding:"24px 20px",boxShadow:"0 2px 8px #0001"}}>
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:18}}>
          <span style={{fontSize:26}}>{tIcon(lesson.type)}</span>
          <div>
            <h2 style={{margin:0,fontSize:18,fontWeight:800,color:"#1e293b"}}>{lesson.title}</h2>
            <span style={{color:mod.color,fontWeight:700,fontSize:13}}>{lesson.xp} XP</span>
          </div>
        </div>
        {lesson.type==="dialogue"&&<Dialogue lesson={lesson} mod={mod} complete={complete} ad={ad}/>}
        {lesson.type==="quiz"&&<Quiz lesson={lesson} mod={mod} ls={ls} setLs={setLs} complete={complete} ad={ad}/>}
        {lesson.type==="fillin"&&<Fillin lesson={lesson} mod={mod} hint={hint} ls={ls} setLs={setLs} complete={complete} ad={ad}/>}
        {lesson.type==="scenario"&&<Scenario lesson={lesson} mod={mod} ls={ls} setLs={setLs} complete={complete} ad={ad}/>}
        {lesson.type==="reading"&&<Reading lesson={lesson} mod={mod} ls={ls} setLs={setLs} complete={complete} ad={ad}/>}
        {lesson.type==="writing"&&<Writing lesson={lesson} mod={mod} hint={hint} ls={ls} setLs={setLs} complete={complete} ad={ad}/>}
      </div>
    </div>
  );
}
function Dialogue({lesson,mod,complete,ad}){
  const [sv,setSv]=useState(false);
  return(
    <div>
      <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:20}}>
        {lesson.lines.map((line,i)=>(
          <div key={i} style={{display:"flex",gap:10,flexDirection:line.s==="Alexandra"?"row-reverse":"row"}}>
            <div style={{fontSize:20}}>{line.s==="Alexandra"?"👩":"🧑‍💼"}</div>
            <div style={{background:line.s==="Alexandra"?mod.bg:"#f1f5f9",border:`1.5px solid ${line.s==="Alexandra"?mod.color+"40":"#e2e8f0"}`,borderRadius:14,padding:"10px 14px",maxWidth:"80%"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",marginBottom:4}}>{line.s}</div>
              <div style={{fontSize:15,color:"#1e293b"}}>{line.t}</div>
            </div>
          </div>
        ))}
      </div>
      <button onClick={()=>setSv(!sv)} style={{background:"#f1f5f9",border:"none",borderRadius:99,padding:"8px 18px",cursor:"pointer",fontWeight:600,fontSize:13,color:"#475569"}}>
        {sv?"▲ Masquer le vocabulaire":"▼ Voir le vocabulaire"}
      </button>
      {sv&&<div style={{marginTop:12,display:"flex",flexDirection:"column",gap:8}}>
        {lesson.vocab.map((v,i)=>(
          <div key={i} style={{display:"flex",gap:8,background:"#f8fafc",borderRadius:8,padding:"8px 12px"}}>
            <span style={{fontWeight:700,color:mod.color}}>{v.fr}</span>
            <span style={{color:"#64748b"}}>—</span>
            <span style={{color:"#475569"}}>{v.ru}</span>
          </div>
        ))}
      </div>}
      <div style={{marginTop:16}}><Btn onClick={()=>complete(lesson.id,lesson.xp)} color={mod.color} disabled={ad}>{ad?"✓ Complete":"Continuer →"}</Btn></div>
    </div>
  );
}
function Quiz({lesson,mod,ls,setLs,complete,ad}){
  const {ans={},sub=false}=ls;
  const qs=lesson.questions;
  const allA=qs.every((_,i)=>ans[i]!==undefined);
  const score=qs.filter((q,i)=>ans[i]===q.a).length;
  return(
    <div>
      {qs.map((q,qi)=>(
        <div key={qi} style={{marginBottom:20}}>
          <div style={{fontWeight:700,color:"#1e293b",marginBottom:10}}>{qi+1}. {q.q}</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {q.o.map((opt,oi)=>{
              let bg="#f1f5f9",br="#e2e8f0",col="#1e293b";
              if(sub){if(oi===q.a){bg="#dcfce7";br="#16a34a";col="#166534";}else if(ans[qi]===oi){bg="#fee2e2";br="#dc2626";col="#7f1d1d";}}
              else if(ans[qi]===oi){bg=mod.bg;br=mod.color;col=mod.color;}
              return <div key={oi} onClick={()=>{if(!sub)setLs(p=>({...p,ans:{...p.ans,[qi]:oi}}))}} style={{background:bg,border:`2px solid ${br}`,borderRadius:10,padding:"10px 14px",cursor:sub?"default":"pointer",color:col,fontWeight:ans[qi]===oi?700:400}}>{opt}</div>;
            })}
          </div>
        </div>
      ))}
      {!sub?<Btn onClick={()=>setLs(p=>({...p,sub:true}))} color={mod.color} disabled={!allA}>Verifier les reponses</Btn>:(
        <div>
          <div style={{background:score===qs.length?"#dcfce7":"#fef3c7",borderRadius:12,padding:"14px 18px",marginTop:12,fontWeight:700,color:score===qs.length?"#166534":"#92400e"}}>
            {score===qs.length?"🎉 Parfait !":` ${score}/${qs.length} — Regarde les reponses en vert.`}
          </div>
          <Btn onClick={()=>complete(lesson.id,lesson.xp)} color={mod.color} disabled={ad}>{ad?"✓ Complete":"Continuer →"}</Btn>
        </div>
      )}
    </div>
  );
}
function Fillin({lesson,mod,hint,ls,setLs,complete,ad}){
  const {ans={},sub=false}=ls;
  const sents=lesson.sentences;
  const allA=sents.every((_,i)=>ans[i]!==undefined);
  const score=sents.filter((s,i)=>ans[i]===s.blank).length;
  return(
    <div>
      <div style={{background:"#f0fdf4",border:"1.5px solid #bbf7d0",borderRadius:12,padding:"12px 16px",marginBottom:18,fontSize:14,color:"#166534"}}>📖 {lesson.expl}</div>
      {hint&&<div style={{background:"#fef3c7",border:"1.5px solid #fbbf24",borderRadius:12,padding:"12px 16px",marginBottom:18,fontSize:14,color:"#92400e"}}>🇷🇺 {lesson.hint_ru}</div>}
      {sents.map((s,i)=>{
        const ch=ans[i];
        let bc="#e2e8f0";
        if(sub)bc=ch===s.blank?"#16a34a":"#dc2626";
        else if(ch)bc=mod.color;
        return(
          <div key={i} style={{marginBottom:18}}>
            <div style={{fontSize:15,color:"#1e293b",marginBottom:10,lineHeight:1.6}}>
              {s.b}<span style={{background:ch?(sub?(ch===s.blank?"#dcfce7":"#fee2e2"):mod.bg):"#f1f5f9",border:`2px solid ${bc}`,borderRadius:8,padding:"2px 10px",fontWeight:700,color:mod.color}}>{ch||"___"}</span>{s.a}
            </div>
            {sub&&ch!==s.blank&&<div style={{fontSize:13,color:"#16a34a",marginBottom:6}}>✓ Reponse correcte : <strong>{s.blank}</strong></div>}
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {s.o.map((opt,oi)=>{
                let bg="#f1f5f9",br="#e2e8f0",col="#475569";
                if(ch===opt){bg=mod.bg;br=mod.color;col=mod.color;}
                return <div key={oi} onClick={()=>{if(!sub)setLs(p=>({...p,ans:{...p.ans,[i]:opt}}))}} style={{background:bg,border:`2px solid ${br}`,borderRadius:99,padding:"6px 16px",cursor:sub?"default":"pointer",color:col,fontWeight:600,fontSize:14}}>{opt}</div>;
              })}
            </div>
          </div>
        );
      })}
      {!sub?<Btn onClick={()=>setLs(p=>({...p,sub:true}))} color={mod.color} disabled={!allA}>Verifier</Btn>:(
        <div>
          <div style={{background:score===sents.length?"#dcfce7":"#fef3c7",borderRadius:12,padding:"12px 16px",fontWeight:700,color:score===sents.length?"#166534":"#92400e",marginTop:8}}>
            {score===sents.length?"🎉 Parfait !":` ${score}/${sents.length} — Regarde les corrections en vert.`}
          </div>
          <Btn onClick={()=>complete(lesson.id,lesson.xp)} color={mod.color} disabled={ad}>{ad?"✓ Complete":"Continuer →"}</Btn>
        </div>
      )}
    </div>
  );
}
function Scenario({lesson,mod,ls,setLs,complete,ad}){
  const {step=0,ch={},fin=false}=ls;
  const ex=lesson.exchanges;
  const choose=(oi)=>{const nc={...ch,[step]:oi};const last=step===ex.length-1;setLs({step:last?step:step+1,ch:nc,fin:last});};
  return(
    <div>
      <div style={{background:"#f0f9ff",border:"1.5px solid #bae6fd",borderRadius:12,padding:"12px 16px",marginBottom:18,fontSize:14,color:"#0369a1"}}>🎭 {lesson.setup}</div>
      {ex.map((e,i)=>{
        if(i>step&&!fin)return null;
        const chosen=ch[i];
        return(
          <div key={i} style={{marginBottom:20}}>
            <div style={{display:"flex",gap:10,marginBottom:10}}>
              <div style={{fontSize:20}}>👤</div>
              <div style={{background:"#f1f5f9",borderRadius:14,padding:"10px 14px"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",marginBottom:4}}>{e.s}</div>
                <div style={{fontSize:15,color:"#1e293b"}}>{e.t}</div>
              </div>
            </div>
            {e.o.map((opt,oi)=>{
              const ic=chosen===oi,cor=e.c===oi;
              let bg="#f1f5f9",br="#e2e8f0",col="#475569";
              if(chosen!==undefined){if(cor){bg="#dcfce7";br="#16a34a";col="#166534";}else if(ic){bg="#fee2e2";br="#dc2626";col="#7f1d1d";}}
              return <div key={oi} onClick={()=>{if(chosen===undefined&&i===step)choose(oi);}} style={{background:bg,border:`2px solid ${br}`,borderRadius:12,padding:"10px 14px",cursor:chosen===undefined&&i===step?"pointer":"default",color:col,fontWeight:ic?700:400,marginBottom:8,marginLeft:32,fontSize:14}}>👩 {opt}</div>;
            })}
            {chosen!==undefined&&<div style={{marginLeft:32,background:e.c===chosen?"#dcfce7":"#fef3c7",border:`1.5px solid ${e.c===chosen?"#16a34a":"#fbbf24"}`,borderRadius:10,padding:"8px 14px",fontSize:13,fontWeight:600,color:e.c===chosen?"#166534":"#92400e"}}>{e.f[chosen]}</div>}
          </div>
        );
      })}
      {fin&&<Btn onClick={()=>complete(lesson.id,lesson.xp)} color={mod.color} disabled={ad}>{ad?"✓ Complete":"Continuer →"}</Btn>}
    </div>
  );
}
function Reading({lesson,mod,ls,setLs,complete,ad}){
  const {ans={},sub=false}=ls;
  const qs=lesson.questions;
  const allA=qs.every((_,i)=>ans[i]!==undefined);
  const score=qs.filter((q,i)=>ans[i]===q.a).length;
  return(
    <div>
      <div style={{background:"#f8fafc",border:"1.5px solid #e2e8f0",borderRadius:12,padding:"16px 18px",marginBottom:20,fontSize:15,lineHeight:1.8,color:"#1e293b",whiteSpace:"pre-line"}}>{lesson.text}</div>
      <div style={{fontWeight:700,color:"#1e293b",marginBottom:14}}>📋 Questions de comprehension :</div>
      {qs.map((q,qi)=>(
        <div key={qi} style={{marginBottom:18}}>
          <div style={{fontWeight:600,color:"#1e293b",marginBottom:8}}>{qi+1}. {q.q}</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {q.o.map((opt,oi)=>{
              let bg="#f1f5f9",br="#e2e8f0",col="#1e293b";
              if(sub){if(oi===q.a){bg="#dcfce7";br="#16a34a";col="#166534";}else if(ans[qi]===oi){bg="#fee2e2";br="#dc2626";col="#7f1d1d";}}
              else if(ans[qi]===oi){bg=mod.bg;br=mod.color;col=mod.color;}
              return <div key={oi} onClick={()=>{if(!sub)setLs(p=>({...p,ans:{...p.ans,[qi]:oi}}))}} style={{background:bg,border:`2px solid ${br}`,borderRadius:10,padding:"10px 14px",cursor:sub?"default":"pointer",color:col,fontWeight:ans[qi]===oi?700:400}}>{opt}</div>;
            })}
          </div>
        </div>
      ))}
      {!sub?<Btn onClick={()=>setLs(p=>({...p,sub:true}))} color={mod.color} disabled={!allA}>Verifier</Btn>:(
        <div>
          <div style={{background:score===qs.length?"#dcfce7":"#fef3c7",borderRadius:12,padding:"12px 16px",fontWeight:700,color:score===qs.length?"#166534":"#92400e",marginTop:8}}>
            {score===qs.length?"🎉 Parfait !":` ${score}/${qs.length} — Relis le texte.`}
          </div>
          <Btn onClick={()=>complete(lesson.id,lesson.xp)} color={mod.color} disabled={ad}>{ad?"✓ Complete":"Continuer →"}</Btn>
        </div>
      )}
    </div>
  );
}
function Writing({lesson,mod,hint,ls,setLs,complete,ad}){
  const {text=lesson.starter,sub=false}=ls;
  const wc=text.trim().split(/\s+/).filter(Boolean).length;
  return(
    <div>
      <div style={{background:mod.bg,border:`1.5px solid ${mod.color}40`,borderRadius:12,padding:"12px 16px",marginBottom:16,fontSize:14,color:"#1e293b"}}>✍️ <strong>Consigne :</strong> {lesson.prompt}</div>
      {hint&&lesson.hint_ru&&<div style={{background:"#fef3c7",border:"1.5px solid #fbbf24",borderRadius:12,padding:"12px 16px",marginBottom:14,fontSize:13,color:"#92400e"}}>🇷🇺 {lesson.hint_ru}</div>}
      <div style={{marginBottom:14}}>
        <div style={{fontWeight:600,color:"#475569",fontSize:13,marginBottom:8}}>💡 Conseils :</div>
        {lesson.tips.map((tip,i)=><div key={i} style={{fontSize:13,color:"#64748b",marginBottom:4}}>• {tip}</div>)}
      </div>
      <textarea value={text} onChange={e=>{if(!sub)setLs(p=>({...p,text:e.target.value}));}} rows={8}
        style={{width:"100%",borderRadius:12,border:`2px solid ${mod.color}60`,padding:"12px 14px",fontSize:14,fontFamily:"inherit",resize:"vertical",outline:"none",color:"#1e293b",lineHeight:1.7,boxSizing:"border-box"}}/>
      <div style={{fontSize:12,color:"#94a3b8",marginTop:4}}>{wc} mots</div>
      {!sub?<Btn onClick={()=>setLs(p=>({...p,sub:true}))} color={mod.color} disabled={wc<20}>Soumettre ma reponse</Btn>:(
        <div>
          <div style={{background:"#dcfce7",border:"1.5px solid #16a34a",borderRadius:12,padding:"14px 18px",fontWeight:700,color:"#166534",marginTop:12}}>🎉 Bravo ! Continue comme ca !</div>
          <Btn onClick={()=>complete(lesson.id,lesson.xp)} color={mod.color} disabled={ad}>{ad?"✓ Complete":"Continuer →"}</Btn>
        </div>
      )}
    </div>
  );
}
function Done({mod,setScreen,xp,badges}){
  return(
    <div style={{maxWidth:500,margin:"60px auto",padding:"0 16px",textAlign:"center"}}>
      <div style={{fontSize:64,marginBottom:16}}>🎉</div>
      <h2 style={{fontSize:24,fontWeight:800,color:"#1e293b"}}>Module complete !</h2>
      <p style={{color:"#64748b",fontSize:16}}>Tu as termine <strong>{mod.title}</strong> !</p>
      <div style={{background:mod.bg,border:`2px solid ${mod.color}40`,borderRadius:16,padding:20,margin:"20px 0"}}>
        <div style={{fontSize:40,marginBottom:8}}>{mod.icon}</div>
        <div style={{fontWeight:800,color:mod.color,fontSize:22}}>{xp} XP total</div>
        <div style={{background:"#e2e8f0",borderRadius:99,height:10,margin:"12px 0 4px",overflow:"hidden"}}>
          <div style={{width:`${Math.round((xp/MAX_XP)*100)}%`,background:`linear-gradient(90deg,${mod.color},#a855f7)`,height:"100%",borderRadius:99}}/>
        </div>
        <div style={{color:"#94a3b8",fontSize:13}}>{Math.round((xp/MAX_XP)*100)}% du cours total</div>
      </div>
      {badges.length>0&&<div style={{marginBottom:20}}>{badges.map(b=><span key={b.id} style={{fontSize:28,margin:"0 6px"}}>{b.icon}</span>)}</div>}
      <button onClick={()=>setScreen("home")} style={{background:mod.color,color:"#fff",border:"none",borderRadius:99,padding:"14px 32px",fontWeight:700,fontSize:16,cursor:"pointer"}}>
        Retour au menu principal →
      </button>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
